{{ define "main" }}
    <article>
        <h2 class="font-extrabold mt-6 text-4xl">{{ .Title }}</h2>
        <div>
            {{ .Content }}
        </div>
        <div> 
            {{ $paginator := .Paginate (sort (where .Site.RegularPages ".Params.featured" "=" true)) }}
            {{ range $paginator.Pages }}
                {{ .Render "summary" }}
            {{ end }}
            {{ partial "pagination.html" . }}
        </div>
    </article>
{{ end }}
